name: Build WinForms

on:
  push:
    branches:
      - master
      # Add more branches here when needed, for example:
      # - main
      # - release/*
  # This is an internal repository, so pull requests may build and publish
  # downloadable artifacts for validation.
  pull_request:
    branches:
      - master
      # Add more target branches here when needed, for example:
      # - main
      # - release/*
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_PATH: HomeworkADONET2026\HomeworkADONET2026.csproj
  RELEASE_DIR: HomeworkADONET2026\bin\Release
  APP_NAME: HomeworkADONET2026

jobs:
  build:
    name: Build .NET Framework 4.8 WinForms
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      # - name: Setup NuGet
      #   uses: NuGet/setup-nuget@v2

      # - name: Restore NuGet packages
      #   shell: pwsh
      #   run: |
      #     nuget restore HomeworkADONET2026\packages.config `
      #       -PackagesDirectory packages `
      #       -NonInteractive

      - name: Set artifact metadata
        id: metadata
        shell: pwsh
        run: |
          $timestamp = Get-Date -Format 'yyyyMMdd-HHmmss'
          $artifactName = "${env:APP_NAME}-$timestamp-${env:GITHUB_SHA}"
          "build_timestamp=$timestamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Release
        shell: pwsh
        run: |
          msbuild $env:PROJECT_PATH `
            /t:Rebuild `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:DebugType=pdbonly `
            /p:DebugSymbols=true

      - name: Package runnable debug artifact
        id: package
        shell: pwsh
        env:
          ARTIFACT_NAME: ${{ steps.metadata.outputs.artifact_name }}
        run: |
          $artifactRoot = Join-Path $env:GITHUB_WORKSPACE 'artifacts'
          $stagingDir = Join-Path $artifactRoot $env:APP_NAME

          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null

          $requiredFiles = @(
            "$env:APP_NAME.exe",
            "$env:APP_NAME.exe.config",
            "$env:APP_NAME.pdb"
          )

          foreach ($file in $requiredFiles) {
            $sourcePath = Join-Path $env:RELEASE_DIR $file
            if (-not (Test-Path -Path $sourcePath -PathType Leaf)) {
              throw "Required build output was not found: $sourcePath"
            }

            Copy-Item -Path $sourcePath -Destination $stagingDir -Force
          }

          Get-ChildItem -Path $env:RELEASE_DIR -Filter '*.dll' -File -Recurse |
            ForEach-Object {
              $relativePath = [System.IO.Path]::GetRelativePath(
                (Resolve-Path $env:RELEASE_DIR).Path,
                $_.FullName
              )
              $destinationPath = Join-Path $stagingDir $relativePath
              $destinationDir = Split-Path -Parent $destinationPath

              New-Item -ItemType Directory -Force -Path $destinationDir | Out-Null
              Copy-Item -LiteralPath $_.FullName -Destination $destinationPath -Force
            }

          "staging_dir=$stagingDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: ${{ steps.package.outputs.staging_dir }}
          if-no-files-found: error
